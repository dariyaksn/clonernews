<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Hacker News Reader</title>
<link rel="stylesheet" href="styles.css" />
</head>
<body>
<div class="container">
<div class="header">
<h1>Hacker News Reader</h1>
<div class="live-update-controls">
<button class="check-updates-btn" id="checkUpdatesBtn">
🔔 Check for Updates
</button>
<span class="last-check-time" id="lastCheckTime">Checking...</span>
</div>
</div>
<div class="controls">
<button class="filter-btn active" data-type="topstories">Top Stories</button>
<button class="filter-btn" data-type="newstories">New Stories</button>
<button class="filter-btn" data-type="jobstories">Jobs</button>
<button class="filter-btn" data-type="askstories">Ask HN</button>
<button class="filter-btn" data-type="polls">Polls</button>
</div>
<div class="posts-container">
<div id="postsContainer"></div>
<button class="load-more-btn" id="loadMoreBtn">Load More Posts</button>
</div>
</div>
<script src="script.js"></script>
</body>
</html>
